<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Galería</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper">

    <header class="site-header">
      <span class="header-label">galería</span>
      <div class="counter">
        <span id="current">01</span>
        <span class="sep">/</span>
        <span id="total">03</span>
      </div>
    </header>

    <main class="gallery-stage">
      <div class="slides-container" id="slidesContainer">
        <!-- Las fotos se cargan automáticamente desde la carpeta imagenes/ -->
        <!-- Agregá o quitá <div class="slide"> según tus fotos -->
        <div class="slide active">
          <img src="imagenes/foto1.jpg" alt="Foto 1" />
        </div>
        <div class="slide">
          <img src="imagenes/foto2.jpg" alt="Foto 2" />
        </div>
        <div class="slide">
          <img src="imagenes/foto3.jpg" alt="Foto 3" />
        </div>
      </div>

      <!-- Controles manuales -->
      <button class="nav-btn prev" id="prevBtn" aria-label="Anterior">&#8592;</button>
      <button class="nav-btn next" id="nextBtn" aria-label="Siguiente">&#8594;</button>

      <!-- Puntos indicadores -->
      <div class="dots" id="dots"></div>
    </main>

    <footer class="site-footer">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
